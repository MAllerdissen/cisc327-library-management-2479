name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "pypy-3.9"]

    env:
      FLASK_APP: app:create_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-mock playwright

      - name: Install Playwright browsers and system deps (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m playwright install chromium
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            python -m playwright install-deps chromium
          fi

      - name: Install Playwright browsers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m playwright install chromium

      - name: Start Flask app and run tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m flask run --host=0.0.0.0 --port=5000 > flask.log 2>&1 &
          FLASK_PID=$!

          python - <<'PY'
import time
import urllib.request

url = 'http://127.0.0.1:5000/'
for _ in range(30):
    try:
        urllib.request.urlopen(url, timeout=1)
        print('Flask server is ready')
        break
    except Exception:
        time.sleep(1)
else:
    raise SystemExit('Flask server did not start')
PY

          python -m pytest -q
          kill $FLASK_PID || true

      - name: Start Flask app and run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process -FilePath python -ArgumentList '-m flask run --host=127.0.0.1 --port=5000' -NoNewWindow -PassThru
          $attempts = 0
          while ($attempts -lt 30) {
            try {
              Invoke-WebRequest -Uri 'http://127.0.0.1:5000/' -UseBasicParsing -TimeoutSec 2 | Out-Null
              Write-Host 'Flask server is ready'
              break
            } catch {
              Start-Sleep -Seconds 1
              $attempts++
            }
          }
          if ($attempts -ge 30) { throw 'Flask server did not start' }
          python -m pytest -q
          $process | Stop-Process -Force