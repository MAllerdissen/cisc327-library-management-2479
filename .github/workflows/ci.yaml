name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    env:
      FLASK_APP: app:create_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-mock playwright

      - name: Install Playwright browsers and system deps
        shell: bash
        run: |
          python -m playwright install chromium
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            python -m playwright install-deps chromium
          fi

      - name: Start Flask app and run tests
        shell: bash
        run: |
          python -m flask run --host=0.0.0.0 --port=5000 > flask.log 2>&1 &
          FLASK_PID=$!
          echo "Flask PID: $FLASK_PID"

          # Wait for Flask to be ready
          echo "Waiting for Flask server..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:5000/ > /dev/null 2>&1; then
              echo "Flask server is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 1
          done

          # Run tests
          python -m pytest -q
          TEST_EXIT=$?

          # Clean up Flask
          kill $FLASK_PID 2>/dev/null || true
          wait $FLASK_PID 2>/dev/null || true

          exit $TEST_EXIT
